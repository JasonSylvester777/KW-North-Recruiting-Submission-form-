<script>
  function toggleQuestionSets() {
    const value = document.getElementById('applicantType').value;
    const existing = document.getElementById('existingQuestions');
    const fresh = document.getElementById('newQuestions');

    existing.classList.remove('active');
    fresh.classList.remove('active');

    if (value === 'Existing Agent') {
      existing.classList.add('active');
    } else if (value === 'Never Been an Agent') {
      fresh.classList.add('active');
    }
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => {
        const result = reader.result.split(',')[1];
        resolve(result);
      };
      reader.onerror = error => reject(error);
    });
  }

  document.getElementById('applicationForm').addEventListener('submit', async function (event) {
    event.preventDefault();

    const submitBtn = document.getElementById('submitBtn');
    const successBox = document.getElementById('successBox');
    const errorBox = document.getElementById('errorBox');
    const cvFile = document.getElementById('cvUpload').files[0];
    const applicantType = document.getElementById('applicantType').value;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting...';
    successBox.style.display = 'none';
    errorBox.style.display = 'none';

    let cvBase64 = '';
    let cvFileName = '';
    let cvMimeType = '';

    try {
      if (applicantType === 'Never Been an Agent' && cvFile) {
        cvBase64 = await fileToBase64(cvFile);
        cvFileName = cvFile.name;
        cvMimeType = cvFile.type || 'application/octet-stream';
      }

      const payload = {
        name: document.getElementById('name').value.trim(),
        surname: document.getElementById('surname').value.trim(),
        contact: document.getElementById('contact').value.trim(),
        email: document.getElementById('email').value.trim(),
        applicantType: applicantType,
        existingQ1: document.getElementById('existingQ1').value.trim(),
        existingQ2: document.getElementById('existingQ2').value.trim(),
        newQ1: document.getElementById('newQ1').value.trim(),
        newQ2: document.getElementById('newQ2').value,
        newQ3: document.getElementById('newQ3').value.trim(),
        newQ4: document.getElementById('newQ4').value,
        newQ5: document.getElementById('newQ5').value.trim(),
        cvBase64: cvBase64,
        cvFileName: cvFileName,
        cvMimeType: cvMimeType
      };

      const response = await fetch('https://script.googleusercontent.com/a/macros/kwsouthafrica.co.za/echo?user_content_key=AY5xjrThf2DlKpsuXBZHIdd9EJhfi_sl6aw7bdCWsCky47JV1n5yw89XW23sZtcusxc2DbTgtfFGkwqBrrdAXh77VRDqD94Lw086jErR4jdGD_WVlrCayKYcjd6QbGRgPGa-WV8RmZs3RPHAA_QlbbaTfudUvT3lL9MeQknNVmQgkhb0KowQkrFY9DDG9fgytafMFL4URJ_Xyducg4aFrhpGV23abwNAWDyYf1Zd93qjhBvO8J_XZq_N27TuF0rT-QzeQTvfdfHQJV8a0N8nP7ApFzsaAcAJ9yk_TVyKT-ICybkNVUsPbUFsfVIL9HnoQg&lib=MOiPt0FxRk-JA6w-XlxgmTxb27mRfOtlc', {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify(payload)
      });

      const result = await response.json();

      if (result.success) {
        successBox.textContent = 'Thank you. Your application has been submitted successfully.';
        successBox.style.display = 'block';
        document.getElementById('applicationForm').reset();
        document.getElementById('existingQuestions').classList.remove('active');
        document.getElementById('newQuestions').classList.remove('active');
      } else {
        errorBox.textContent = result.message || 'There was a problem submitting your application. Please try again.';
        errorBox.style.display = 'block';
      }
    } catch (error) {
      errorBox.textContent = 'There was a problem submitting your application. Please try again.';
      errorBox.style.display = 'block';
    }

    submitBtn.disabled = false;
    submitBtn.textContent = 'Submit Application';
  });
</script>
